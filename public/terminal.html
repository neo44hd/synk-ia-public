<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinkia — Terminal IA</title>

<!-- xterm.js 5.3 CDN -->
<link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #080808;
  --surface: #111111;
  --border:  #222222;
  --border2: #2a2a2a;
  --text:    #e8e8e8;
  --muted:   #555;
  --green:   #22c55e;
  --red:     #ef4444;
  --yellow:  #eab308;
  --radius:  12px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* ── Header ───────────────────────────────────────────────────────────────── */
.header {
  height: 52px;
  background: rgba(8,8,8,.9);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  flex-shrink: 0;
}

.logo { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
.logo span { color: var(--green); }

.tag {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  background: #0d1a0d;
  border: 1px solid #15803d;
  color: var(--green);
  padding: 3px 9px;
  border-radius: 100px;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--muted);
  transition: all .3s;
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  transition: all .3s;
}
.dot.green  { background: var(--green);  box-shadow: 0 0 6px var(--green);  animation: pulse 2s infinite; }
.dot.red    { background: var(--red);    box-shadow: 0 0 6px var(--red); }
.dot.yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 2s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .4; }
}

.sep { flex: 1; }

.btn {
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn:hover           { border-color: var(--green); color: var(--green); }
.btn.danger:hover    { border-color: var(--red); color: var(--red); }
.btn.reconnect       { border-color: var(--yellow); color: var(--yellow); display: none; }
.btn.reconnect.show  { display: inline-flex; }

/* ── Terminal container ───────────────────────────────────────────────────── */
.terminal-wrap {
  position: relative;
  height: calc(100vh - 52px);
  background: #0a0a0a;
  padding: 12px 16px;
  overflow: hidden;
}

#terminal {
  width: 100%;
  height: 100%;
}

/* xterm override — transparent bg */
.xterm-viewport { background: transparent !important; }

/* ── Login overlay ────────────────────────────────────────────────────────── */
#login-overlay {
  position: absolute;
  inset: 0;
  background: rgba(8,8,8,.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
  width: 340px;
  text-align: center;
}

.login-card .logo { font-size: 24px; margin-bottom: 4px; }
.login-sub  { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

.login-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 14px;
  outline: none;
  margin-bottom: 10px;
  transition: border-color .2s;
}
.login-input:focus { border-color: var(--green); }

.login-btn {
  width: 100%;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 11px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s;
}
.login-btn:hover { opacity: .85; }
.login-err { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

/* ── Connecting overlay ───────────────────────────────────────────────────── */
#connecting-overlay {
  position: absolute;
  inset: 0;
  background: rgba(8,8,8,.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 5;
  display: none;
}

.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.connecting-text { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="header">
  <div class="logo">sinkia<span>.</span></div>
  <div class="tag">Terminal IA</div>
  <div class="status-pill" id="status-pill">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Desconectado</span>
  </div>
  <div class="sep"></div>
  <button class="btn reconnect" id="reconnect-btn" onclick="connect()">↺ Reconectar</button>
  <a class="btn" href="/admin">← Panel</a>
  <a class="btn" href="/chat">💬 Chat</a>
</header>

<!-- ── Terminal area ───────────────────────────────────────────────────────── -->
<div class="terminal-wrap">

  <!-- Login overlay -->
  <div id="login-overlay">
    <div class="login-card">
      <div class="logo">sinkia<span>.</span></div>
      <div class="login-sub">Terminal de IA — acceso restringido</div>
      <input class="login-input" type="password" id="token-input"
             placeholder="Token de acceso" autocomplete="off">
      <button class="login-btn" onclick="doLogin()">Entrar</button>
      <div class="login-err" id="login-err">Token incorrecto</div>
    </div>
  </div>

  <!-- Connecting overlay -->
  <div id="connecting-overlay">
    <div class="spinner"></div>
    <div class="connecting-text">Conectando con Claude Code...</div>
  </div>

  <!-- xterm container -->
  <div id="terminal"></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('admin_token') || '';
let term, fitAddon, ws;

// ── Auth ──────────────────────────────────────────────────────────────────────
function doLogin() {
  TOKEN = document.getElementById('token-input').value.trim();
  // Validar contra /api/admin/processes
  fetch('/api/admin/processes', {
    headers: { 'x-admin-token': TOKEN }
  }).then(r => {
    if (!r.ok) throw new Error('Unauthorized');
    localStorage.setItem('admin_token', TOKEN);
    document.getElementById('login-overlay').style.display = 'none';
    initTerminal();
    connect();
  }).catch(() => {
    document.getElementById('login-err').style.display = 'block';
  });
}

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── Init terminal ─────────────────────────────────────────────────────────────
function initTerminal() {
  if (term) return;

  term = new Terminal({
    theme: {
      background:    '#0a0a0a',
      foreground:    '#e8e8e8',
      cursor:        '#22c55e',
      cursorAccent:  '#000',
      selectionBackground: 'rgba(34,197,94,.25)',
      black:         '#1a1a1a',
      red:           '#ef4444',
      green:         '#22c55e',
      yellow:        '#eab308',
      blue:          '#3b82f6',
      magenta:       '#a855f7',
      cyan:          '#06b6d4',
      white:         '#e8e8e8',
      brightBlack:   '#555',
      brightRed:     '#f87171',
      brightGreen:   '#4ade80',
      brightYellow:  '#facc15',
      brightBlue:    '#60a5fa',
      brightMagenta: '#c084fc',
      brightCyan:    '#22d3ee',
      brightWhite:   '#f5f5f5',
    },
    fontFamily: "'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace",
    fontSize:    14,
    lineHeight:  1.4,
    cursorBlink: true,
    cursorStyle: 'bar',
    scrollback:  5000,
    allowProposedApi: true,
  });

  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  // Enviar input al servidor
  term.onData(data => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(data);
  });

  // Resize
  term.onResize(({ cols, rows }) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    }
  });

  // Ajustar al cambio de ventana
  const resizeObs = new ResizeObserver(() => { try { fitAddon.fit(); } catch {} });
  resizeObs.observe(document.getElementById('terminal'));
  window.addEventListener('resize', () => { try { fitAddon.fit(); } catch {} });
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  if (ws && ws.readyState === WebSocket.OPEN) return;

  setStatus('connecting');
  showConnecting(true);

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url   = `${proto}//${location.host}/terminal/ws?token=${encodeURIComponent(TOKEN)}`;

  ws = new WebSocket(url);

  ws.onopen = () => {
    showConnecting(false);
    setStatus('open');
    document.getElementById('reconnect-btn').classList.remove('show');
    // Enviar tamaño inicial
    const { cols, rows } = term;
    ws.send(JSON.stringify({ type: 'resize', cols, rows }));
  };

  ws.onmessage = (e) => {
    term.write(typeof e.data === 'string' ? e.data : new Uint8Array(e.data));
  };

  ws.onclose = (e) => {
    showConnecting(false);
    setStatus('closed');
    document.getElementById('reconnect-btn').classList.add('show');
    if (e.code === 1006) {
      term.writeln('\r\n\x1b[31m[Conexión perdida — haz clic en "Reconectar"]\x1b[0m');
    }
  };

  ws.onerror = () => {
    showConnecting(false);
    setStatus('error');
    term.writeln('\r\n\x1b[31m[Error de WebSocket]\x1b[0m');
  };
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(state) {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  const map  = {
    connecting: ['yellow', 'Conectando...'],
    open:       ['green',  'Conectado'],
    closed:     ['red',    'Desconectado'],
    error:      ['red',    'Error'],
  };
  const [cls, label] = map[state] || ['', state];
  dot.className  = `dot ${cls}`;
  text.textContent = label;
}

function showConnecting(show) {
  document.getElementById('connecting-overlay').style.display = show ? 'flex' : 'none';
}

// ── Auto-login si ya hay token ────────────────────────────────────────────────
if (TOKEN) {
  fetch('/api/admin/processes', { headers: { 'x-admin-token': TOKEN } })
    .then(r => {
      if (!r.ok) throw new Error();
      document.getElementById('login-overlay').style.display = 'none';
      initTerminal();
      connect();
    })
    .catch(() => {
      localStorage.removeItem('admin_token');
      TOKEN = '';
    });
}
</script>
</body>
</html>
